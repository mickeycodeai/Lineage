<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-LAB | Responsive</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root {
    --primary: #007aff;
    --bg: #ffffff;
    --sidebar: #f8f9fa;
    --text: #1d1d1f;
    --muted: #6e6e73;
    --border: #e5e7eb;
    --bubble: #f2f2f7;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* SIDEBAR */
nav {
    width: 300px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    transition: 0.3s;
}

.brand {
    font-weight: 800;
    font-size: 1.5rem;
    margin-bottom: 40px;
}

.brand span { color: var(--primary); }

.mode-btn {
    padding: 12px;
    border: none;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
}

.mode-btn.active {
    background: white;
}

/* MAIN */
main {
    flex:1;
    display:flex;
    flex-direction:column;
    height:100%;
}

/* HEADER (mobile) */
.topbar {
    display:none;
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    align-items:center;
    justify-content:space-between;
}

.menu-btn {
    font-size:20px;
    cursor:pointer;
}

/* CHAT */
#chat-feed {
    flex:1;
    overflow-y:auto;
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:20px;
    max-width:900px;
    margin:auto;
    width:100%;
}

.message {
    display:flex;
    gap:10px;
}

.bubble {
    padding:14px 18px;
    border-radius:16px;
    background:var(--bubble);
}

.user .bubble {
    background:#007aff;
    color:white;
    margin-left:auto;
}

/* INPUT */
.input-area {
    border-top:1px solid var(--border);
    padding:12px;
    background:white;
}

.input-wrap {
    display:flex;
    background:#fff;
    border:1px solid var(--border);
    border-radius:20px;
    padding:10px 14px;
}

input {
    flex:1;
    border:none;
    outline:none;
    font-size:15px;
}

button.send {
    border:none;
    background:var(--primary);
    color:white;
    padding:8px 14px;
    border-radius:10px;
    cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){

    nav {
        position:fixed;
        left:-100%;
        top:0;
        height:100%;
        z-index:1000;
    }

    nav.open {
        left:0;
    }

    .topbar {
        display:flex;
    }

    #chat-feed {
        padding:16px;
    }
}
</style>
</head>

<body>

<nav id="sidebar">
    <div class="brand">AI<span>-</span>LAB</div>

    <button class="mode-btn active" onclick="setMode('fast')">General</button>
    <button class="mode-btn" onclick="setMode('coder')">Technical</button>
</nav>

<main>

<div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div>AI-LAB</div>
</div>

<div id="chat-feed">
    <div class="message">
        <div class="bubble">AI-LAB Ready.</div>
    </div>
</div>

<div class="input-area">
    <div class="input-wrap">
        <input id="input" placeholder="Type message...">
        <button class="send" onclick="send()">Send</button>
    </div>
</div>

</main>

<script>

const API = "https://unblossomed-mattie-transmentally.ngrok-free.dev/v1/chat";

let mode = "fast";

function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("open");
}

function setMode(m){
    mode = m;
    document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
}

function addMessage(text, cls){
    const feed = document.getElementById("chat-feed");
    const div = document.createElement("div");
    div.className = "message " + cls;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
}

async function send(){
    const input = document.getElementById("input");
    const val = input.value.trim();
    if(!val) return;

    addMessage(val, "user");
    input.value = "";

    try{
        const res = await fetch(API,{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "x-api-key":"lineage"
            },
            body:JSON.stringify({mensahe:val, mode})
        });

        const data = await res.json();
        addMessage(marked.parse(data.sagot), "ai");

    }catch{
        addMessage("Error connecting to backend","ai");
    }
}

document.getElementById("input").addEventListener("keypress", e=>{
    if(e.key==="Enter") send();
});

</script>

</body>
</html>
